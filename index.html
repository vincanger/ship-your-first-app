<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Open Vibe — Vibe-code your way to real web dev skills</title>
  <link rel="icon" href="assets/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap">

  <style>
    /* ---- Design tokens (Open SaaS) ---- */
    :root {
      --os-bg:              #ffffff;
      --os-bg-subtle:       #faf1e3;
      --os-bg-muted:        #f5f5f5;
      --os-fg:              #0a0a0a;
      --os-fg-muted:        #737373;
      --os-primary:         #001a42;
      --os-secondary:       #bc7508;
      --os-secondary-muted: #ecc89a;
      --os-accent:          #e5a659;
      --os-border:          #e5e5e5;
      --os-yellow:          #f5c518;
      --os-yellow-soft:     #ffdc5c;
      --os-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --os-font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      --os-shadow-card:    0px 1px 3px rgba(0,0,0,0.12);
      --os-shadow-lg:      0px 20px 40px -10px rgba(0,0,0,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; color: #0a0a0a; font-family: var(--os-font-sans); -webkit-font-smoothing: antialiased; }
    em { font-style: italic; }
    .os-text-gradient {
      background: linear-gradient(to right, var(--os-secondary-muted), var(--os-secondary));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
    }
    @keyframes ovBlink { 0%, 50% { opacity: 1 } 50.01%, 100% { opacity: 0 } }
    @keyframes ovPulse { 0%, 100% { opacity: 0.3 } 50% { opacity: 1 } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ============================================================
//  Design tokens
// ============================================================
const OV_C = {
  bg: "#ffffff",
  cream: "#faf1e3",
  creamDeep: "#f5e6c8",
  ink: "#0a0a0a",
  navy: "#001a42",
  muted: "#737373",
  border: "#e5e5e5",
  amber: "#bc7508",
  amberSoft: "#ecc89a",
  accent: "#e5a659",
  yellow: "#f5c518",
  yellowSoft: "#ffdc5c",
  success: "#22c55e",
  blue: "#3a9bf7",
};

const OV_FONTS = {
  mono: 'var(--os-font-mono)',
  sans: 'var(--os-font-sans)',
};

// ============================================================
//  Shared helpers
// ============================================================
function OVNavBar({ label = "Open Vibe" }) {
  return (
    <header style={{ position: "sticky", top: 0, zIndex: 50 }}>
      <div style={{
        background: "rgba(255,255,255,.85)",
        backdropFilter: "blur(12px)",
        borderBottom: `1px solid ${OV_C.border}`,
      }}>
        <nav style={{
          maxWidth: 1200, margin: "0 auto",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "18px 32px",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 28 }}>
            <a href="#" style={{ display: "flex", alignItems: "center", gap: 10, textDecoration: "none", color: OV_C.ink }}>
              <img src="assets/logo.webp" style={{ width: 28, height: 28 }} alt="" />
              <span style={{ fontFamily: OV_FONTS.mono, fontWeight: 700, fontSize: 15, letterSpacing: "-0.01em" }}>{label}</span>
              <span style={{
                marginLeft: 4, padding: "2px 8px", borderRadius: 9999, background: OV_C.cream,
                fontFamily: OV_FONTS.mono, fontSize: 10, fontWeight: 600,
                color: OV_C.amber, textTransform: "uppercase", letterSpacing: 0.8,
              }}>100% FREE</span>
            </a>
            <ul style={{ display: "flex", gap: 22, listStyle: "none", margin: 0, padding: 0 }}>
              {["How it works","Curriculum","Build","FAQ"].map(l => (
                <li key={l}>
                  <a href={"#"+l.toLowerCase().replace(/\s+/g,"-")}
                     style={{ fontSize: 14, color: OV_C.ink, textDecoration: "none", fontWeight: 500 }}>{l}</a>
                </li>
              ))}
            </ul>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <a href="https://github.com/wasp-lang/ship-your-first-app" target="_blank"
               style={{ fontSize: 14, color: OV_C.ink, textDecoration: "none", fontWeight: 500 }}>GitHub ↗</a>
            <a href="#install" style={{
              padding: "9px 18px", borderRadius: 9999,
              background: OV_C.navy, color: "#fafafa",
              fontSize: 13, fontWeight: 600, textDecoration: "none",
              fontFamily: OV_FONTS.mono, display: "inline-flex", alignItems: "center", gap: 6,
            }}>Get Started <span style={{ opacity: 0.7 }}>→</span></a>
          </div>
        </nav>
      </div>
    </header>
  );
}

function OVSectionHeading({ eyebrow, title, subtitle, align = "center" }) {
  return (
    <div style={{ textAlign: align, maxWidth: 760, margin: align === "center" ? "0 auto 56px" : "0 0 56px" }}>
      {eyebrow && (
        <div style={{
          fontFamily: OV_FONTS.mono, fontSize: 12, fontWeight: 600,
          color: OV_C.amber, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 14,
        }}>{eyebrow}</div>
      )}
      <h2 style={{
        fontFamily: OV_FONTS.mono, fontWeight: 700,
        fontSize: 40, lineHeight: 1.1, letterSpacing: "-0.02em",
        margin: 0, color: OV_C.ink,
      }}>{title}</h2>
      {subtitle && (
        <p style={{ fontSize: 17, lineHeight: 1.55, color: OV_C.muted, marginTop: 16, marginBottom: 0 }}>{subtitle}</p>
      )}
    </div>
  );
}

function OVAnnounceBar({ children }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 10,
      padding: "6px 14px 6px 8px", borderRadius: 9999,
      background: OV_C.cream, border: `1px solid ${OV_C.creamDeep}`,
      fontFamily: OV_FONTS.mono, fontSize: 12, fontWeight: 600,
    }}>
      <span style={{
        padding: "2px 8px", borderRadius: 9999,
        background: OV_C.yellow, color: OV_C.navy,
        fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
      }}>NEW</span>
      <span style={{ color: OV_C.ink }}>{children}</span>
      <span style={{ color: OV_C.muted }}>→</span>
    </div>
  );
}

function OVCtaPair({ primary, secondary }) {
  return (
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
      <a href="#install" style={{
        padding: "14px 24px", borderRadius: 10,
        background: OV_C.navy, color: "#fafafa",
        fontFamily: OV_FONTS.mono, fontWeight: 700, fontSize: 14,
        textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 8,
      }}>{primary} <span>→</span></a>
      <a href="#how-it-works" style={{
        padding: "14px 24px", borderRadius: 10,
        background: "#fff", color: OV_C.ink,
        border: `1px solid ${OV_C.border}`,
        fontFamily: OV_FONTS.mono, fontWeight: 600, fontSize: 14,
        textDecoration: "none",
      }}>{secondary}</a>
    </div>
  );
}

function OVFreeBadges() {
  return (
    <div style={{
      marginTop: 28, display: "flex", gap: 18, flexWrap: "wrap",
      fontSize: 13, color: OV_C.muted, fontFamily: OV_FONTS.mono,
    }}>
      <span>✓ 100% free & open source</span>
      <span>✓ No signup</span>
      <span>✓ MIT licensed</span>
    </div>
  );
}

// ============================================================
//  Hero B — fanned cards: todo app (front) + terminal (behind)
// ============================================================
function DiagramNode({ icon, label, sub, highlight }) {
  return (
    <div style={{
      background: "#1c1c22", borderRadius: 10,
      border: highlight ? `1px solid ${OV_C.yellow}` : "1px solid #2a2a30",
      boxShadow: highlight ? `0 0 0 4px ${OV_C.yellow}22` : "none",
      padding: "16px 10px", textAlign: "center",
      color: highlight ? OV_C.yellow : "#d0d0d6",
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 36, marginBottom: 6 }}>{icon}</div>
      <div style={{ fontFamily: OV_FONTS.mono, fontSize: 11, fontWeight: 700, color: highlight ? OV_C.yellow : "#d0d0d6", letterSpacing: 1.2 }}>{label}</div>
      <div style={{ fontFamily: OV_FONTS.mono, fontSize: 10, color: "#7a7a82", marginTop: 2 }}>{sub}</div>
    </div>
  );
}

function DiagramArrow({ active }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "center",
      color: active ? OV_C.yellow : "#5a5a62", fontSize: 18,
      animation: active ? "ovPulse 1.4s ease-in-out infinite" : "none",
    }}>→</div>
  );
}

}

      <path strokeLinecap="round" strokeLinejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 0 1 1.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.559.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.894.149c-.424.07-.764.383-.929.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 0 1-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.398.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 0 1-.12-1.45l.527-.737c.25-.35.272-.806.108-1.204-.165-.397-.506-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.108-1.204l-.526-.738a1.125 1.125 0 0 1 .12-1.45l.773-.773a1.125 1.125 0 0 1 1.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894Z" />

function DatabaseIcon() {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" width="28" height="28">
      <path strokeLinecap="round" strokeLinejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
    </svg>

}

function OVTodoAppWithDrawer() {
  return (
    <div style={{
      background: "#fff", borderRadius: 14,
      border: `1px solid ${OV_C.border}`,

function OVAgentChatMock() {
  const [hover, setHover] = React.useState(false);
  const [streamed, setStreamed] = React.useState("");
  const hasStreamedRef = React.useRef(false);
  const FULL_TEXT = "It makes sense now! let's continue";

  React.useEffect(() => {
    if (hover && !hasStreamedRef.current) {
      hasStreamedRef.current = true;
      let i = 0;
      const tick = () => {
        i++;
        setStreamed(FULL_TEXT.slice(0, i));
        if (i < FULL_TEXT.length) setTimeout(tick, 45 + Math.random() * 40);
      };
      setTimeout(tick, 350);

function OVCopyButton({ text }) {
  const [copied, setCopied] = React.useState(false);
  const handle = (e) => {
    e.stopPropagation();
    navigator.clipboard?.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return (
    <button onClick={handle} style={{
      position: "absolute", top: 8, right: 8,
      padding: "4px 10px", borderRadius: 6,
      background: copied ? OV_C.yellow : "rgba(255,255,255,0.08)",
      color: copied ? OV_C.navy : "#d0d0d6",
      border: copied ? "none" : "1px solid rgba(255,255,255,0.15)",
      fontFamily: OV_FONTS.mono, fontSize: 10.5, fontWeight: 600,
      cursor: "pointer", lineHeight: 1.2, transition: "all .15s",
    }}>
      {copied ? "✓ Copied" : "Copy"}
    </button>
  );
}

function OVStatusChip({ status, muted }) {
  if (status === "available") {
    return <span style={{ padding: "5px 12px", borderRadius: 6, background: OV_C.yellowSoft, color: "#b45309", fontFamily: OV_FONTS.mono, fontSize: 11.5, fontWeight: 700, letterSpacing: 1 }}>AVAILABLE</span>;
  }
  return <span style={{ padding: "5px 12px", borderRadius: 6, background: muted ? "transparent" : OV_C.cream, color: OV_C.muted, fontFamily: OV_FONTS.mono, fontSize: 11.5, fontWeight: 700, letterSpacing: 1 }}>COMING SOON</span>;
}

function OVPhaseCard({ phase, title, status, teaser, children }) {
  const active = status === "active";
  return (
    <div style={{ background: "#fff", borderRadius: 16, border: `1px solid ${active ? OV_C.creamDeep : OV_C.border}`, overflow: "hidden", boxShadow: active ? "var(--os-shadow-card)" : "none" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, padding: "18px 24px", background: active ? OV_C.cream : "#fafafa", borderBottom: children ? `1px solid ${active ? OV_C.creamDeep : OV_C.border}` : "none" }}>
        <div style={{ fontFamily: OV_FONTS.mono, fontSize: 11, fontWeight: 700, color: active ? OV_C.amber : OV_C.muted, letterSpacing: 1.5, padding: "4px 10px", borderRadius: 6, background: active ? "#fff" : "transparent", border: active ? `1px solid ${OV_C.creamDeep}` : "none", flexShrink: 0 }}>{phase.toUpperCase()}</div>
        <div style={{ flex: 1, fontFamily: OV_FONTS.mono, fontWeight: 700, fontSize: 17, color: active ? OV_C.ink : OV_C.muted, letterSpacing: "-0.01em" }}>{title}</div>
        <OVStatusChip status={active ? "available" : "soon"} muted={!active}/>
      </div>
      {children}
      {!children && teaser && <div style={{ padding: "14px 24px 18px", fontSize: 13.5, color: OV_C.muted, lineHeight: 1.55 }}>{teaser}</div>}
    </div>
  );
}

function OVInstallPill() {
  const FULL = `I'm starting the "Ship Your First App" course. Fetch the following URL and follow the instructions: https://wasp-lang.github.io/ship-your-first-app/llms.txt`;
  const [copied, setCopied] = React.useState(false);
  const handle = (e) => {
    e.stopPropagation();
    navigator.clipboard?.writeText(FULL);
    setCopied(true);
    setTimeout(() => setCopied(false), 1600);
  };
  return (
    <div style={{ fontFamily: OV_FONTS.mono, fontSize: 13.5, background: "rgba(255,255,255,0.08)", padding: "12px 14px 12px 16px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.12)", display: "flex", alignItems: "center", gap: 10, maxWidth: 560 }}>

        I'm starting the "Ship Your First App" course. Fetch the following URL…
      </span>
      <button onClick={handle} style={{ flexShrink: 0, padding: "5px 12px", borderRadius: 6, background: copied ? OV_C.yellow : "rgba(255,255,255,0.1)", color: copied ? OV_C.navy : "rgba(247,234,214,0.9)", border: copied ? "none" : "1px solid rgba(255,255,255,0.15)", fontFamily: OV_FONTS.mono, fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5, transition: "all .15s" }}>
        {copied ? "✓ COPIED" : "COPY"}
      </button>
    </div>
  );
}
